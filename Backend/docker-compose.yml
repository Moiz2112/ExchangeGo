services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: 'rabbitmq'
    hostname: queue
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
      - rabbitmq_log:/var/log/rabbitmq/
    networks:
      - coinstrove_net
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: 'coinstrove_db'
    environment:
      POSTGRES_USER: coinstrove
      POSTGRES_PASSWORD: coinstrove123
      POSTGRES_DB: coinstrove
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coinstrove_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coinstrove"]
      interval: 10s
      timeout: 5s
      retries: 5

  datasvc:
    build: .
    hostname: dsvc
    ports:
      - 8080:8080
    environment:
      - DB_URL=postgres://coinstrove:coinstrove123@postgres:5432/coinstrove?sslmode=disable
      - RABBITMQ_URL=amqp://guest:guest@queue:5672/
    networks:
      - coinstrove_net
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

networks:
  coinstrove_net:
    driver: bridge

volumes:
  rabbitmq_data:
  rabbitmq_log:
  postgres_data: